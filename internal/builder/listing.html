<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.Site.Title}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Overpass+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <script>(function(){try{var t=localStorage.getItem('pagepop-theme');if(t==='neo')document.documentElement.setAttribute('data-theme','neo');}catch(e){}})();</script>
</head>

<body>

    <main class="listing">
        <h1>{{.Site.Title}}</h1>
        <ul class="post-list">
            {{range .Posts}}
            <li class="post-item">
                <article>
                    <a href='{{.Meta.Date.Format "2006/01/02"}}/{{.Meta.Slug}}/index.html' class="post-link">
                        <h2 class="post-title">{{.Meta.Title}}</h2>
                    </a>
                    <p class="post-desc">{{.Meta.Description}}</p>
                    {{if .Meta.Tags}}
                    <div class="post-tags">
                        <i class="fa-solid fa-tags"></i>
                        {{range .Meta.Tags}}<span class="tag">{{.}}</span>{{end}}
                    </div>
                    {{end}}
                    <time class="post-date"><i class="fa-regular fa-calendar"></i> {{.Meta.Date.Format "January 2, 2006"}}</time>
                </article>
            </li>
            {{end}}
        </ul>
    </main>

    <button id="theme-toggle" aria-label="Toggle theme"></button>
    <script>
        (function () {
            var btn = document.getElementById('theme-toggle');
            var html = document.documentElement;
            function sync() {
                var isNeo = html.getAttribute('data-theme') === 'neo';
                btn.innerHTML = isNeo
                    ? '<i class="fa-solid fa-circle-half-stroke"></i> Default'
                    : '<i class="fa-solid fa-palette"></i> Neo Brutalism';
            }
            sync();
            btn.addEventListener('click', function () {
                if (html.getAttribute('data-theme') === 'neo') {
                    html.removeAttribute('data-theme');
                    try { localStorage.removeItem('pagepop-theme'); } catch (e) {}
                } else {
                    html.setAttribute('data-theme', 'neo');
                    try { localStorage.setItem('pagepop-theme', 'neo'); } catch (e) {}
                }
                sync();
            });
        })();
    </script>
</body>

</html>

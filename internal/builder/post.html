<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.Meta.Title}} - {{.Site.Title}}</title>
    <meta name="description" content="{{.Meta.Description}}" />
    <meta property="og:title" content="{{.Meta.Title}}" />
    <meta property="og:description" content="{{.Meta.Description}}" />
    <meta property="og:type" content="article" />
    {{if .Site.BaseURL}}
    <meta property="og:url" content="{{.Site.BaseURL}}/{{.Meta.Date.Format " 2006/01/02"}}/{{.Meta.Slug}}/index.html" />
    {{end}}
    <meta name="twitter:card" content="summary" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Overpass+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{.CSSHref}}" />
    <link rel="stylesheet" href="https://cdn.datatables.net/2.2.2/css/dataTables.dataTables.min.css" />
    <script>(function(){try{var t=localStorage.getItem('pagepop-theme');if(t==='neo')document.documentElement.setAttribute('data-theme','neo');}catch(e){}})();</script>
</head>

<body>

    <main class="post">
        <article>
            <header class="post-header">
                <h1>{{.Meta.Title}}</h1>
                <p class="post-desc">{{.Meta.Description}}</p>
                {{if .Meta.Tags}}
                <div class="post-tags">
                    {{range .Meta.Tags}}<span class="tag">{{.}}</span>{{end}}
                </div>
                {{end}}
                <time>{{.Meta.Date.Format "January 2, 2006"}}</time>
            </header>
            {{if .TOC}}
            {{.TOC}}
            {{end}}
            <div class="post-body">
                {{.Body}}
            </div>
        </article>
    </main>

    <script src="https://cdn.datatables.net/2.2.2/js/dataTables.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('.post-body table').forEach(function (table) {
                new DataTable(table, {
                    paging: true,
                    searching: true,
                    ordering: true,
                    pageLength: 10
                });
            });
        });
    </script>
    <button id="theme-toggle" aria-label="Toggle theme"></button>
    <script>
        (function () {
            var btn = document.getElementById('theme-toggle');
            var html = document.documentElement;
            function sync() {
                btn.textContent = html.getAttribute('data-theme') === 'neo' ? 'Default' : 'Neo Brutalism';
            }
            sync();
            btn.addEventListener('click', function () {
                if (html.getAttribute('data-theme') === 'neo') {
                    html.removeAttribute('data-theme');
                    try { localStorage.removeItem('pagepop-theme'); } catch (e) {}
                } else {
                    html.setAttribute('data-theme', 'neo');
                    try { localStorage.setItem('pagepop-theme', 'neo'); } catch (e) {}
                }
                sync();
            });
        })();
    </script>
</body>

</html>

<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.Meta.Title}} - {{.Site.Title}}</title>
    <meta name="description" content="{{.Meta.Description}}" />
    <meta property="og:title" content="{{.Meta.Title}}" />
    <meta property="og:description" content="{{.Meta.Description}}" />
    <meta property="og:type" content="article" />
    {{if .Site.BaseURL}}
    <meta property="og:url" content="{{.Site.BaseURL}}/{{.Meta.Date.Format " 2006/01/02"}}/{{.Meta.Slug}}/index.html" />
    {{end}}
    <meta name="twitter:card" content="summary" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400..800&family=Overpass+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{.CSSHref}}" />
    <link rel="stylesheet" href="https://cdn.datatables.net/2.2.2/css/dataTables.dataTables.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <script>(function(){try{var t=localStorage.getItem('pagepop-theme');if(t&&/^neo-(spotted-pardalote|plains-wanderer|rainbow-bee-eater|rose-crowned-fruit-dove|eastern-rosella|olive-backed-oriole|princess-parrot|superb-fairywren|southern-cassowary|eastern-yellow-robin|galah|blue-winged-kookaburra)$/.test(t))document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
</head>

<body>

    <main class="post">
        <article>
            <header class="post-header">
                <h1>{{.Meta.Title}}</h1>
                <p class="post-desc">{{.Meta.Description}}</p>
                {{if .Meta.Tags}}
                <div class="post-tags">
                    <i class="fa-solid fa-tags"></i>
                    {{range .Meta.Tags}}<span class="tag">{{.}}</span>{{end}}
                </div>
                {{end}}
                <time><i class="fa-regular fa-calendar"></i> {{.Meta.Date.Format "January 2, 2006"}}</time>
            </header>
            {{if .TOC}}
            <div class="post-layout {{if .TOCTop}}toc-top{{else}}toc-side{{end}}">
                <aside class="toc-sidebar">
                    {{.TOC}}
                </aside>
                <div class="post-body">
                    {{.Body}}
                </div>
            </div>
            {{else}}
            <div class="post-body">
                {{.Body}}
            </div>
            {{end}}
        </article>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/2.2.2/js/dataTables.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('.post-body table').forEach(function (table) {
                new DataTable(table, {
                    paging: true,
                    searching: true,
                    ordering: true,
                    pageLength: 10
                });
            });
        });
    </script>
    <div id="theme-picker">
        <button id="theme-toggle" aria-label="Choose theme"><i class="fa-solid fa-palette"></i> Theme</button>
        <div id="theme-menu" hidden>
            <button data-theme="">Default</button>
            <button data-theme="neo-spotted-pardalote">Spotted Pardalote</button>
            <button data-theme="neo-plains-wanderer">Plains-wanderer</button>
            <button data-theme="neo-rainbow-bee-eater">Rainbow Bee-eater</button>
            <button data-theme="neo-rose-crowned-fruit-dove">Rose-crowned Fruit-dove</button>
            <button data-theme="neo-eastern-rosella">Eastern Rosella</button>
            <button data-theme="neo-olive-backed-oriole">Olive-backed Oriole</button>
            <button data-theme="neo-princess-parrot">Princess Parrot</button>
            <button data-theme="neo-superb-fairywren">Superb Fairywren</button>
            <button data-theme="neo-southern-cassowary">Southern Cassowary</button>
            <button data-theme="neo-eastern-yellow-robin">Eastern Yellow Robin</button>
            <button data-theme="neo-galah">Galah</button>
            <button data-theme="neo-blue-winged-kookaburra">Blue-winged Kookaburra</button>
        </div>
    </div>
    <script>
        (function () {
            var toggle = document.getElementById('theme-toggle');
            var menu = document.getElementById('theme-menu');
            var html = document.documentElement;
            function current() { return html.getAttribute('data-theme') || ''; }
            function applyTheme(t) {
                if (t) html.setAttribute('data-theme', t);
                else html.removeAttribute('data-theme');
                try { if (t) localStorage.setItem('pagepop-theme', t); else localStorage.removeItem('pagepop-theme'); } catch(e) {}
                syncActive();
            }
            function syncActive() {
                var t = current();
                menu.querySelectorAll('button[data-theme]').forEach(function(b) {
                    b.classList.toggle('active', b.getAttribute('data-theme') === t);
                });
            }
            toggle.addEventListener('click', function(e) { e.stopPropagation(); menu.hidden = !menu.hidden; });
            menu.querySelectorAll('button[data-theme]').forEach(function(b) {
                b.addEventListener('click', function(e) { e.stopPropagation(); applyTheme(b.getAttribute('data-theme')); menu.hidden = true; });
            });
            document.addEventListener('click', function() { menu.hidden = true; });
            syncActive();
        })();
    </script>
</body>

</html>
